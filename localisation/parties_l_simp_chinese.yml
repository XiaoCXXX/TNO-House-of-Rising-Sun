l_simp_chinese:
 communism: "共产主义"
 communism_noun: "共产主义"
 democratic: "民主主义"
 democratic_noun: "民主主义"
 fascism: "法西斯主义"
 fascism_noun: "法西斯主义"
 fascism_desc: "极权政体"
 communism_desc: "极权政体"
 democratic_desc: "民主政体"
 conservatism: "保守主义"
 conservatism_desc: "保守民主主义，更普遍地称作保守主义，是民主国家内倾向于依靠已经证实可用的思想、传统价值观和不同程度民族主义的派系。保守派基本反对文化与法律上的变化，同时仅支持逐步实施他们所赞同的改动。\n\n然而，这一思想的支持者与其他更激进的传统主义者的差别在于他们仍热切地相信某种形式的民主体制，并认为人民会在选举中偏向传统主义而不需以压迫政权的形式强加于上。此类保守派通常会在选举中被击败后承认失败并更愿意与其他党派与意识形态的组织进行合作。"
 liberalism: "自由主义"
 liberalism_desc: "在尊重个人自由的悠久哲学传统下，自由主义将捍卫这些权利视为国家的首要职能。"
 socialism: "社会民主主义"
 socialism_desc: "社会民主主义一词广泛包含了仍希望保持基本类似资本主义框架运作的左翼运动。社民主义支持者仍相信市场机制、个人运营企业并管理其他雇员的能力，以及赚取与消费金钱的自由，同时推广庞大的社会计划：社会福利、免费公共医疗保险、流浪者庇护所、丰厚的基本工资以及许多其他项目。\n\n虽然被定为在政治光谱左面，但社民主义支持者与其他例如共产主义或传统社会主义等左翼思想支持者互相之间关系恶劣，且很少有来往或合作，社民主义者并不像其他更极端的左翼派一样推崇革命与对社会体制的激进改革，而且对一系列其他民主主义思想持开放态度。"
 marxism: "马克思主义"
 marxism_desc: "马克思主义涵盖从经济学到历史观的辽阔领域，其根本上力图将卡尔·马克思的理论付诸政治实践。主张阶级斗争以及过渡至生产资料公有制社会是这种意识形态的主要特征。"
 leninism: "列宁主义"
 leninism_desc: "列宁主义是一种基于马克思主义的意识形态流派，其旨在以党领导革命颠覆资本主义社会的方式建立社会主义国家。而在取得政权后，这种意识形态下的政党会通过内部讨论决策的方式执政。"
 stalinism: "斯大林主义"
 stalinism_desc: "作为对马克思列宁主义在政治上的继承和发展，斯大林主义重视快速工业化与集体化，并认为只有强而有力的社会主义政府才能彻底肃清反革命分子。"
 anti_revisionism: "反修正主义"
 anti_revisionism_desc: "反修正主义是一种为反击众多自诩马克思主义继承人的意识形态而产生的流派，提倡保持原始革命理论的核心要素。其主要反对将资本主义经济元素引入社会主义国家，这种意识形态很大程度上通过“什么不是什么”而非“什么是什么”来定义。"
 anarchist_communism: "无政府共产主义"
 anarchist_communism_desc: "无政府共产主义是一种将共产主义理想视为无国家社会的意识形态，其主张跳过具备过渡性质的社会主义国家，倾向于直接建立互帮互助的社会。"
 nazism: "民族社会主义"
 nazism_desc: "在德国的情况下，深入纳粹主义乌黑核心的几个关键信条：扎根每一个政治行动中的反犹主义；深深厌恶传统自由民主主义、议会体制与资本主义；还有对共产主义的强烈憎恨。虽然大多数民族社会主义国家都是德意志国的直接或间接合作者，这一名词现在多用于描述世界各地反映纳粹主义思想基础的各类法西斯主义运动，且带有独特的色彩，如激进日本帝国主义。"
 GER_fascism_desc: "民族社会主义（又简称纳粹主义），指代一系列结合了激进法西斯主义、极端军国主义、极权主义与一党专政并要求所有个人服从共同利益需求的国家。它与其他法西斯主义相差的特征在于其核心宗旨在于残酷地执行种族等级制与具有侵略性与种族灭绝的扩张主义，为的是给本民族人民提供“生存空间”。"
 gen_nazism: "纳粹主义"
 gen_nazism_desc: "民族社会主义（又简称纳粹主义），指代一系列结合了激进法西斯主义、极端军国主义、极权主义与一党专政并要求所有个人服从共同利益需求的国家。它与其他法西斯主义相差的特征在于其核心宗旨在于残酷地执行种族等级制与具有侵略性与种族灭绝的扩张主义，为的是给本民族人民提供“生存空间”。\n\n在德国的情况下，深入纳粹主义乌黑核心的几个关键信条：扎根每一个政治行动中的反犹主义；深深厌恶传统自由民主主义、议会体制与资本主义；还有对共产主义的强烈憎恨。虽然大多数民族社会主义国家都是德意志国的直接或间接合作者，这一名词现在多用于描述世界各地反映纳粹主义思想基础的各类法西斯主义运动，且带有独特的色彩，如激进日本帝国主义。"
 fascism_ideology: "法西斯主义"
 fascism_ideology_desc: "历数在一战后的动乱中诞生的意识形态，唯一证明了在欧洲达成并维持强权地位的意识形态即是法西斯主义。法西斯主义受幻想破灭的共产主义与威权民族主义影响，时常因其所受极左与极右意识形态的启发而被标为“第三立场主义”。虽然该意识形态世界观中仍能发掘到一丝马克思主义思想-依赖生产者的辩证法，但以民族替代了经济阶级-这伟大的民族主义思想导致与社会主义的国际主义思潮相冲突，并不可避免地导致了战间年代在德国、西班牙与意大利各国国内的冲突。但法西斯主义党派最终都获得了胜利并埋葬了社会主义反对者。\n\n最能强调法西斯主义的特征来源于其推崇的对国家近乎盲从的忠诚。政府通常由一个强势领导人所掌控，作为该地最高仲裁者与专制者。宗教机构、工会、私有企业之类可能会受许以被限制的形式存在，但他们也必定会奉承国家机关。法西斯政府还会推崇民族传说，讲述一群过去曾光辉一时的优越高贵民族被剥夺了荣誉，并以此要求人民团结一致追回失去的东西。他们会讽刺民主国家守着衰落的尊严不放、社会主义国家则是屈服于落伍退步-但又非常矛盾地将这些国家视为意图夺取或摧毁他们一切珍视之物的威胁。"
 falangism: "长枪党主义"
 falangism_desc: "长枪主义是一种兼具法西斯主义和保守主义特征的威权主义意识形态，其非常重视民族和天主教的身份认同。"
 rexism: "雷克斯主义"
 rexism_desc: "雷克斯主义是一种强烈反对自由主义及共产主义，同时提倡社团主义经济的坚定的保守民族主义意识形态。鉴于其越来越多地使用民粹主义和威权主义的言辞，他们的理念正与其他法西斯运动相接近。"
 neutrality: "中立主义"
 neutrality_noun: "中立主义"
 neutrality_desc: "威权政体"
 Reformism: "改良主义"
 opportunism: "改良主义"
 revisionism: "修正主义"
 Bukharinism: "布哈林主义"
 communism1: "共产主义"
 communism2: "共产主义"
 communism3: "共产主义"
 communism4: "布哈林思想"
 communism4_desc: "布哈林主义不提倡用暴力手段与资产阶级做斗争,同时也保护着广大劳动者的权益,布哈林坚信在无产阶级政权条件下,社会可以和平长入社会主义,富农经济也可能和平长入社会主义体系,可以用经济手段允许富农加入合作社,使之纳入社会主义轨道,为社会主义经济建设服务。\n\n并且布哈林主义认为建设的社会主义是发展中的社会主义,在其发展的长时期内将是一种落后的社会主义,其决定性的问题在于吸引农民参加社会主义建设;因此,应当首先发展农业,农业应是国民经济的基础,主张通过合作社以及农民接受的其他形式来引导农民走发展生产的道路,实行使农民富裕的政策。"
