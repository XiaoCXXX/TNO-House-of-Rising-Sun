 MAN_puyi_TNO: "爱新觉罗·溥仪"
 Leader_Puyi_desc: "溥仪，一个被命运戏弄的可怜虫。\n\n1936年的长春，曾经的“新京”在日本关东军的铁腕下勉强披上了一层虚假的繁荣。溥仪——这位被历史遗弃的末代皇帝——坐在新建的皇宫中，手中紧握一柄镀金的玉玺，眼神中却透着茫然与不安。1932年，日本扶持他登上满洲国皇帝的宝座，许诺让他重现清朝的辉煌；四年后，他发现自己不过是一具牵线的木偶，皇袍下藏着关东军军官的冷笑。\n\n溥仪的统治是虚幻的舞台剧。每一声“万岁”的呼喊都来自日本教官训练出的傀儡卫队，每一道诏书都需经过东京的审查。满洲的矿产与粮食源源不断流向日本，而他只能在皇宫内翻阅过时的清朝典籍，幻想着一个遥不可及的帝国。布满金箔的宫殿掩盖不了外界的动荡：中国东北的游击队日益壮大，而日本的主子们则在暗中盘算如何榨干这片土地的最后一滴油水。\n\n溥仪的追随者——若真有追随者的话——称他为“复兴的象征”，认为他能为满洲走向辉煌。他试图在关东军的阴影下争取些许自主权，幻想与日本决裂。然而，1936年的他，依然是历史的囚徒，等待着下一次更大的风暴将他吞没。"
 Guizhou_He_Yingqin: "何应钦"
 POLITICS_HE_YINGQIN_DESC: "每日每夜，命途多舛的何应钦对贵州的控制都看似摇摇欲坠。他的军队已经被滇系实际控制，而经济也岌岌可危。\n\n本来，众人都以为，作为蒋介石的左膀右臂，精明强干的何应钦会在中国的统治上扮演重要角色。当然，包括何应钦在内的大多数人都没能料想到，第二次中日战争是如此的凶残恐怖，以至于一大批国民党元老都命丧黄泉，而汪精卫得以起势。何应钦在战争的最后几天投敌，这使他的政治声誉险些烟消云散，直到现在一直站在风口浪尖。\n\n现在，何应钦这位由中国任命的贵州省长，正在平衡少数民族和汉族的关系，并试图稳步使国家自由化。同时，滇系的威胁也令他夜不能寐。"
 YUN_zhengfu1: "卢汉"
 POLITICS_LU_HAN_DESC_2: "稍微对云南局势有些了解的人都会知道卢汉将军，云南这个偏远小邦的统治者，上任的时候面对的是局势多么复杂的烂摊子。\n\n卢汉是彝族人，于1895年出生在昭通。在早些年，他就与自己的亲表哥龙云一同学习军事。和平的岁月一晃而过，当日本帝国主义入侵时，卢汉通过与日本人的一场场战争精进自己的战略水平，机智而狡猾地与日本军队对抗，保卫他的乡土远离压迫。但这还是远远不够。让卢汉深感痛苦与悔恨的是，他最终被日军击溃，而日本人迫使龙云退位，让卢汉成为了云南的新省长。自此之后，他只能设法在日本人的压迫下辗转腾挪，尽自己所能保卫云南的人民。\n\n当异议者谴责卢汉血腥镇压西南地区的土匪与叛军时，他自己的心也在滴血。卢汉的良心每日都在遭受煎熬，但他别无选择。他不得不镇压那些爱国者与饥民蜕变成的土匪，即使他的良心每日深夜的啸叫都让他辗转难眠。\n\n为了他自己的平安，为了他乡土的平安，为了全云南人民的福祉，他只能秉持自己的观念，一条路走到黑。反帝实在是虚无缥缈的屁话。受国之垢，是谓社稷主，只要能生存下去，那些流言蜚语与胯下之辱又算什么呢？"
 Shanxi_Fu_Zuoyi: "傅作义"
 POLITICS_FU_ZUOYI_DESC: "傅作义是忍辱负重的英雄，还是卖国求荣的叛徒？\n\n要想找到这个问题的答案，就得回顾傅作义将军的一生：年仅16岁时就参加了辛亥革命，从保定军校毕业后又加入了阎锡山的晋军，凭借着作战勇猛一路高升。在中原大战期间，傅作义被任命移防绥远，出任绥远省主席。他在这片土地上倾注了相当多的心血，百姓在他的庇护下安居乐业。随后面对日本人的入侵，傅作义毫不留情的予以坚决还击，一次次的挫败了日本人与其走狗德王的阴谋诡计。\n\n但是，单凭爱国之心无法阻挡兵强马壮的日军，绥远最终还是沦陷，阎长官控制的山西省也丧于敌手。在此之后，傅作义与阎锡山似乎消失在众人的视野中。当他们再次出现时，所有人都对他们表示怀疑，他们现身的时机实在太过合适了：日本刚正式与中国签订停战协议，而他们则急切表现出与愿意日本人合作的态度。为解决时常袭扰他们的游击队，日本人接受了阎锡山与傅作义的提议，将他们任命为一省长官。阎锡山回到了他的山西老家，而傅作义则被派到了各路土匪横行的陕西省。在外人眼中，傅作义是个卖国求荣的汉奸，而傅作义自己心里明白，他所做的一切都是为了保护爱国志士的权宜之策，即使这会让他背上卖国贼的骂名，傅作义也在所不惜。傅作义不顾阎锡山屡次责问，放任许多抗日势力通过陕西成功逃亡。傅作义暗自在心中发誓，总有一天，他会和这些爱国志士在解放中国的战场上再次并肩作战。\n\n傅作义坚守这一信念，如当年治理绥远一般精心打理着陕西，在他的老长官阎锡山去世之后，山西也归于傅作义的控制之下。如今，傅作义已是手握两省之地的封疆大吏，而他心中那一缕抗日救国的火焰依旧没有熄灭。但这缕火苗的未来正在变得飘忽不定：杀人如麻的辻政信盘踞陕西西部，抗日力量在他的残酷镇压之下渐渐灭亡。对此，傅作义束手无策，只能等待转机的到来。\n\n傅作义究竟是忍辱负重的英雄，还是卖国求荣的叛徒？历史终将做出正确的判断，因为这位将军已经为他的信仰付出了一切。"
 Guangxi_Xia_Wei: "夏威"
 POLITICS_XIA_WEI_DESC: "夏威为人无比忠诚，一向如此。\n\n自儿时起，他便与白崇禧和黄绍竑相识结交，并对他们竭诚以待。在二十世纪早期，他们三人同经考验，共渡难关，先是作为同学互相帮助，后是作为同志共同奋斗。他对新广西及其代表的一切忠贞不二，全身心投入其斗争当中，积极参与了对蒋的作战与对共的剿杀。然而，他的忠诚还要献给一样事物，他对其的忠诚不可动摇、至死不渝——那便是中国本身。毕竟，难道有人能说，在抗日战争风雷激荡之时，他没有为她投身国军，为她抗击日寇，为她浴血奋战吗？\n\n只是，单凭赤胆忠心，并不能使中国免于军靴之践踏。也是天不遂人愿，在桂军准备好前，在第11、19、20、29、31和38集团军得以发动最后一次胜利攻势，以此将日本陆军赶出国境前，时日已然无多。大局已定之时，夏威发现自己成为了广西高层中仅剩的最后一人。此刻，他感到绝望至极。日本军队正一天天逼近，他因此不得不走上谈判桌。在那，他面临着最终抉择：是抵抗到底、直至毁灭，还是代表“自由”广西省，对唯一合法的中华民国政府宣誓效忠？对此，他只得以做作之面孔，报以一声苦笑。他们想要他的忠诚？那就如他们所愿。\n\n此后，他便将自身的签名交给了他们，但他绝没有将真心也交付过去。他永不会如此。他绝不会向提线木偶献上忠诚，也不会把它交给背后捅刀的赤色分子。他将自身托付于一个梦想，奉献于一份对自由的永恒渴望。这梦想、这渴望永不会熄灭，直到有一天，他将广西家乡统领于强有力的铁拳之下。无比沉重的税负和几近恐怖的兵役压垮了人民？那不要紧。整个广西除战争机器外什么都不是了？也不要紧。真正要紧的是让中国彻底摆脱外国主子，让她再也不奴颜婢膝，再也不屈居人下。夏威为人无比忠诚。他献身事业，彻彻底底：为追求其实现，任何牺牲都不算过分。\n\n因为，舍此无物可委身。"
 SIC_Liu_Wenhui: "刘文辉"
 Leader_LIU_WENHUI_desc: "刘文辉生于1895年，是一个彻头彻尾的军人。他于1916年毕业于保定军校，自保定回川后，投入刘存厚川军麾下，1926年加入国民党后，在国军内迅速崛起，被提拔为国民革命军第24军军长，1929年被任命为四川省政府主席。省内军阀林立，令四川省十分不稳。通过远交近攻、阴谋暗害，以及武力威慑，刘文辉成功稳定其在四川省的绝对地位。然而，在1934年，他却被他的侄子刘湘赶出四川，逃往西康担任建省委员会委员长。刘湘与蒋介石关系就如四川本身与蒋的关系一般摇摇欲坠，他甚至多次拒绝蒋介石的命令。\n\n抗战期间，刘文辉稳扎稳打，没有让部队轻易冒进，日本人攻至四川时，刘文辉虽是四川最后的大军阀，但却选择召集部队，撤退至西康，在小城西昌扎营。刘文辉拒绝向日本投降，日本人也认为这个山区小省无足轻重，没必要耗费兵力攻打。\n\n日本攻克四川数十年后的今日，刘文辉作为中华大地仅存的独立军阀之一孤立无援。四川就在西康边上，或许受到中央政权的直接控制，但四川已再次陷入动荡，各式各样的势力都在争夺四川的控制权。刘文辉想要见到一个自由的中国，但手下却极力阻止。他们认定与日本作战，无异于自杀。或许只有奇迹，才能让刘文辉得以重新拿起武器……"
 SIC_Liuwenhui: "刘文辉"
 Leader_LIU_WENHUI_desc: "刘文辉生于1895年，是一个彻头彻尾的军人。他于1916年毕业于保定军校，自保定回川后，投入刘存厚川军麾下，1926年加入国民党后，在国军内迅速崛起，被提拔为国民革命军第24军军长，1929年被任命为四川省政府主席。省内军阀林立，令四川省十分不稳。通过远交近攻、阴谋暗害，以及武力威慑，刘文辉成功稳定其在四川省的绝对地位。然而，在1934年，他却被他的侄子刘湘赶出四川，逃往西康担任建省委员会委员长。刘湘与蒋介石关系就如四川本身与蒋的关系一般摇摇欲坠，他甚至多次拒绝蒋介石的命令。\n\n抗战期间，刘文辉稳扎稳打，没有让部队轻易冒进，日本人攻至四川时，刘文辉虽是四川最后的大军阀，但却选择召集部队，撤退至西康，在小城西昌扎营。刘文辉拒绝向日本投降，日本人也认为这个山区小省无足轻重，没必要耗费兵力攻打。\n\n日本攻克四川数十年后的今日，刘文辉作为中华大地仅存的独立军阀之一孤立无援。四川就在西康边上，或许受到中央政权的直接控制，但四川已再次陷入动荡，各式各样的势力都在争夺四川的控制权。刘文辉想要见到一个自由的中国，但手下却极力阻止。他们认定与日本作战，无异于自杀。或许只有奇迹，才能让刘文辉得以重新拿起武器……"
 XSM_MaJiyuan: "马继援"
 portrait_XSM_MA_JIYUAN_DESC: "西北大地是一片洒满了鲜血的土地，曾经有一代人在这片土地上献出了自己的生命，他们之中有的人得以入土为安，其他人只能暴尸荒野。这些人的遗孤则满腔忧愤，手中握着破破烂烂的武器，继续生活在黄土高坡上。有一位年轻人的父亲被入侵西北的日本军队杀害，而他的儿子将杀父之仇铭记于心，继续治理着这片土地，并且发誓要为父报仇。他就是马步芳的儿子，马继援。\n\n马步芳战死之后，马家军的指挥权落在了雄心勃勃的马继援手中。然而，马继援只能眼睁睁地看着辻政信在西北横行霸道，他手下那些嗜血的强盗们烧杀抢掠无恶不作，犯下了太多令人发指的罪行。南边的西藏在边境上屡次试探，而虚弱的马家军无力做出反抗。马家军的敌人们也许以为马继援早已忘记他们犯下的罪行，但他们错了，马继援一直将这些暴行牢记心间，只待复仇的时机。\n\n华夏大地上正酝酿着一场风暴，暴雨前夜的安宁随时都会被打破。马家军正厉兵秣马、枕戈待旦，马继援要让那些欺马家、蹂躏故土的强盗血债血偿。虽然马家军已遭受严重的损失，但他们还没有被打倒。马继援对此十分清楚，很快，他要让全中国都知道，马家军已东山再起。"
 GAN_ZhanLanfeng: "张岚峰"
 POLITICS_MASANOBU_TSUJI_DESC: "张岚峰"
 portrait_SNM_Leonida_Suzzi_Valli_DESC: "莱昂尼达·苏齐·瓦利阁下是最庄严尊贵的圣马力诺共和国，一个坐落在亚平宁山脉蒂塔诺山上的小共和国，最新当选的执政官。瓦利本是一名教授数学和物理的高中教师,后来也进入了共和国的政治舞台,从事外交工作。尽管瓦利对法西斯主义及其对他的小国家曾经的自由和民主生活的负面影响感到不满,但为了继续他的政治生涯,瓦利被迫加入了圣马力诺法西斯党。\n\n尽管他的国家被法西斯主义者和强大的戈齐家族所控制,后者多次将其家庭成员安排在执政官的位置上,但瓦利仍继续着他的政治活动。多年来,瓦利成为反对戈齐家族的最主要成员,最终成功地成为执政官,目标是撤销过去的不民主不自由政策,让古老的共和国恢复一些自由。\n\n尽管圣马力诺古老的民主传统被法西斯主义玷污了，但在过去的几十年里,圣马力诺有了很大的发展,而新的麻烦也随之困扰着这个古老的共和国。随着工业化和城市化进程的加快,国家的经济越来越依赖意大利,这削弱了圣马力诺宝贵的独立,而工人和无产阶级对共和国的体制也越来越不满。现在瓦利和他的盟友们必须驾驭这个苦扰着蒂塔诺山的错综复杂网络，同时还要小心翼翼地避免引起邻国意大利过多的不必要注意。"
 portrait_CHI_wang_jingwei_DESC: "在嘉陵江的浓雾散去后，重庆的废墟上飘扬起了“旭日旗”，而汪精卫，这个曾经的革命诗人、孙中山的左膀右臂，如今却站在南京的“和平政府”大殿内，俯视着被战火蹂躏的中华大地。他的笑容温文尔雅，眼神却透着掩不住的疲惫与空虚。他自称是“救国”的先驱，宣扬“和平、反共、建国”的三民主义新解，却被无数国人唾骂为“汉奸之王”。\n\n汪精卫曾是国民党的明星，1925年孙中山逝世后，他以激进的左翼姿态领导广州国民政府，与蒋介石分庭抗礼。然而，1938年的武汉失守让他心灰意冷，1939年他叛逃至日占区，与日本关东军达成“和平协议”，在南京建立傀儡政权。\n\n当蒋介石与毛泽东在重庆的焦土中战死，汪精卫的“和平政府”终于吞并了残存的国民政府，成为日本“大东亚共荣圈”在中国唯一的“合法”代表。他称自己的道路是“以和救国”，坚信只有与日本合作，中华才能避免彻底的毁灭。然而，事实却如一记耳光：日本掠夺中国的资源，将江南的工厂拆迁至满洲，强征农民的粮食，屠戮反抗的村庄。汪精卫的“和平”不过是日本刺刀下的幻梦，他的“新三民主义”不过是为侵略者涂脂抹粉的空话。他的政权内部充斥着腐败与内斗，亲日派与投机分子争权夺利，而他本人却深陷病痛与幻灭，靠着日本人的支持苟延残喘。\n\n在南京的总统府内，汪精卫每日凝视窗外的秦淮河，喃喃自语：“我救了中华……我救了中华……”但夜深人静时，他是否听见了重庆废墟中死难者的低语？是否看见了游击队在四川山林中点燃的火种？\n\n汪精卫的“和平”或许能延续一时，但中华的灵魂从未屈服。"
