 IBR_francisco_francow: "弗朗西斯科·佛朗哥"
 POLITICS_Giuseppe_Castellano_DESC: "朱塞佩·卡斯特拉诺将军可能是意大利皇家陆军上层圈子的最常见八卦话题之一。作为一个两次世界大战的老兵，他在上一次世界大战期间在巴尔干战场服役时表现出色，之后又升职进了意大利的最高司令部。卡斯特拉诺的雄心高涨，但是命运却另有安排——在战争结束几年后，新任领袖加莱亚佐·齐亚诺托付重任给卡斯特拉诺，让他去管理阿尔及利亚边疆这个法外之地。\n\n卡斯特拉诺担任阿尔及利亚军管领地的领导人已经有几年了，但他的领导对于改善这个地区的局势并没有多大作用。意大利殖民者们多数是从西西里来的，而且往往和老牌黑手党家族有所联系，他们被阿尔及利亚所吸引，是因为这个地区被认为远离罗马当局的监视。由这些殖民者形成的飞地遍布着阿尔及利亚，而关于卡斯特拉诺和黑手党关系的真正程度也有着许多传言。罗马决定支持由阿尔及利亚当地人形成的民兵组织，例如民族解放阵线，让他们武装反抗伊比利亚殖民地政府和他们的“黑脚”盟友，而这一决定也造成了进一步的不稳定。\n\n被困在阿尔及利亚的总督没有多少资源能来开展实际工作，而因此只能被迫坐视局势脱离他的控制越来越远。不过，随着三头同盟内部局势再度紧张，阿尔及利亚和卡斯特拉诺也许会发现自己再一次成为焦点。一旦如此，卡斯特拉诺也许会有机会向意大利证明自己的有用之处，从而找回脸面——从一个通过暗中交易和幕后谈判统治着帝国一个偏僻角落的将军，变成一个从众多敌人手中拯救帝国边疆的民族英雄。"
 POLITICS_MUHAMMAD_VIII_DESC: "如今的突尼斯正像是老话说的一样，躲得过初一，躲不过十五。轴心国军队横扫北非之时，突尼斯兴高采烈地甩掉了德国的枷锁，却又迎来了罗马更加严酷的统治。过去三十年里，欧陆秩序被碾压得支离破碎，面目全非，而突尼斯则依然如故。在侯赛因王朝贝伊穆罕默德八世·阿明的身上，动荡之中的停滞体现得淋漓尽致。\n\n穆罕默德八世更为人所熟知的名字是拉明贝伊，他是蒙塞夫贝伊的表弟，也是他选定的继承人。蒙塞夫贝伊在战争中致力于挣脱法国霸权，一手缔造了战后的突尼斯。尽管贝伊对意大利的退让引起了部分民众的强烈不满，但他依然被认为是突尼斯的民族英雄。此后，意大利将突尼斯并入其非洲领地的计划以失败告终，罗马于是选中了拉明贝伊，担任保护国摄政。讽刺的是，这个政权与很久之前法国的手笔并无二致。\n\n意大利既是突尼斯的解放者，也是突尼斯的奴役者；拉明贝伊既是意大利的帮凶，也是反抗意大利的推手。法律上说，贝伊是罗马国王统治的代表，但他与表兄一样，也希望与意大利协商谈判，还突尼斯以自由。与他有联系的宪政党既是合作机构，也是真正可靠的民族主义力量，寻求着谨慎合法的道路，迈向自由的祖国。然而，突尼斯是个分化极其严重的地方，贝伊也越来越老态龙钟——若是贝伊猝然离世，宪政党精心搭建起的平衡就可能在一瞬之间土崩瓦解。"
 #法国
 FRV_beidang: "亨利·菲利浦·贝当"
 POLITICS_FRV_beidang_DESC: "在巴黎的陷落与法国的屈辱中，菲利普·贝当，这位白发苍苍的老人，站在维希温泉小镇的政府大楼阳台上，凝视着被战争撕裂的法兰西。他的军装虽依旧笔挺，但眼神中却流露出无尽的疲惫与矛盾。他是凡尔登的英雄，1916年以铁血之姿守住法国的尊严；如今，他却成了轴心国的傀儡，被迫在德国的刺刀下签署“和平”的妥协。\n\n仅仅不过几个月，法国的防线在德军闪电战下土崩瓦解，巴黎沦陷，第三共和国轰然倒塌。贝当临危受命，以84岁高龄接过国家元帅的权杖，承诺带领法国走出战火的深渊。他在维希建立新政权，宣扬“工作、家庭、祖国”的信条，试图以“国家革命”重塑法国的灵魂。然而，这一切不过是德国占领者的精心伪装。维希法国不过是第三帝国的附庸，贝当的每一道命令都需经柏林的点头，他的“复兴”不过是为纳粹的战车铺路。\n\n贝当自称是法国的“盾牌”，以牺牲自由换取和平，保护法兰西免于彻底的毁灭。他签署了向德国输送劳工的协议，默许了犹太人的驱逐，甚至下令镇压抵抗运动。他的追随者将他奉为救世主，称他为“最后的希望”；而抵抗军则咒骂他为“卖国贼”，在暗处磨砺刺刀，誓要推翻他的统治。在维希的宫殿里,贝当夜夜难眠，耳边回荡着凡尔登的炮火与巴黎街头的怒吼。他是否仍在自问：这真的是为了法兰西，还是只是为了他自己的虚荣？贝当相信，法国的崩溃源于道德的沦丧与自由主义的腐化。他的“国家革命”高举“劳动、家庭、祖国”的旗帜，试图唤回一个纯净的、传统的法兰西。但在德国的铁腕与国内的分裂下，他的理想如同风中之烛，摇曳不定。他是救赎者，还是傀儡？是守护传统的先知，还是被时代抛弃的老人？"
