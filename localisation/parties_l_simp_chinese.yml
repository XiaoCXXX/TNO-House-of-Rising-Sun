 emperor_fascism: "皇道法西斯主义"
 emperor_fascism_desc: "皇道法西斯主义是一种极端的民族主义意识形态，由于其权力自上而下地施加于国民，因此又被称为“上位法西斯主义”。在该意识形态下，政权由军方与贵族出身的官僚掌控，平民无从置喙，而国家则以该国君主为绝对核心，奉其为无谬的神圣存在，至高无上、不可违逆。"
 japan_militarism_ideology: "军国主义"
 japan_militarism_ideology_desc: "军国主义是一种国家元首只拥有名义上统治权的意识形态，在这种意识形态下，国家元首更像是本国军方的傀儡，而非独立的政治家。这种政权主张不断推进其战略，以实现快速扩张的最终目标。"
 buddhist_socialism: "佛教社会主义"
 buddhist_socialism_desc: "佛教社会主义，也被称为法性社会主义或自然社会主义，是一种主张依据佛教原理实行社会主义的政治理念。佛教和社会主义都试图通过分析苦难的成因并通过实践消除其主要根源，从而终结人类的苦难。两者都追求实现个人意识的转变，以消除人类异化与自私本性。"
