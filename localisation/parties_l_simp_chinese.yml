 guizubaoshou: "贵族保守主义"
 guizubaoshou_desc: "不管是共和国还是君主国，国家到底有没有民主从来没有定数。很少能有哪种意识形态能像贵族保守主义这样，以一种无比微妙、甚至有些阴险的形式来体现这种观点。这种国家通常确实有一部宪法，同时也拥有民主政体该有的所有机构和政治结构。"
