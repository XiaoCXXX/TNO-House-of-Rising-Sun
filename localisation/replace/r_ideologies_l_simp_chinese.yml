 # ========== 意识形态描述 ==========
 national_socialism_desc: "民族社会主义强调本民族的优越性与绝对忠诚，主张以极权手段实现国家统一与扩张。"
 ultra_nationalism_desc: "极端民族主义将民族利益推向极致，不惜以任何代价维护民族纯粹性与霸权地位。"
 fascism_desc: "法西斯主义主张国家至上、强人领导与社团经济，强调秩序与民族复兴。"
 despotism_desc: "专制主义以个人或寡头集团的绝对权力为核心，缺乏民意约束，通过压制维持统治。"
 neutrality_desc: "家长制以传统权威为社会基石，强调由上而下的指导与保护，维护既有的等级秩序。"
 conservatism_desc: "保守主义珍视传统价值观与社会稳定，主张渐进改良而非激进变革。"
 democratic_desc: "自由保守主义在维护传统秩序的同时，接受宪政民主框架，强调个人自由与财产权。"
 liberalism_desc: "自由主义以个人自由为最高价值，主张限制政府权力，推动社会进步与市场开放。"
 progressivism_desc: "进步主义追求社会正义与平等，支持工人权益、社会福利与民主改革。"
 socialism_desc: "社会主义主张生产资料公有化，通过国家计划实现公平分配与社会保障。"
 communism_desc: "共产主义追求无阶级社会，主张彻底推翻资本主义制度，建立无产阶级专政。"
